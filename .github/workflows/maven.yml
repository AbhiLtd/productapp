# CI/CD: Maven build -> upload JAR -> multi-arch build & push to GHCR -> scan -> immutable promote dev->stage->prod
name: Java CI/CD with Maven and GHCR (multi-arch + security scan)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build (Maven) and set metadata
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_image.outputs.image_name }}
      sha_tag: ${{ steps.set_tag.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Set image sha tag
        id: set_tag
        run: |
          echo "sha_tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set lowercase image name
        id: set_image
        run: |
          repo_lower=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${repo_lower}" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build_and_push_dev:
    name: Build & push Docker image (dev) + scan
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    outputs:
      image_digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact (JAR)
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (prefer PAT, fallback to GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Show image refs
        run: |
          echo "Image base: ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}"
          echo "Tags: dev and ${{ needs.build.outputs.sha_tag }}"

      - name: Build & push image (multi-arch) and capture digest
        id: build_image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:dev
            ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.sha_tag }}
          build-args: |
            JAR_FILE=artifact/*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save digest to file (artifact)
        run: |
          echo "${{ steps.build_image.outputs.digest }}" > image-digest.txt
          echo "digest=${{ steps.build_image.outputs.digest }}"
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt

      - name: Scan image with Trivy (Docker-run method)
        # This step runs the helper script which invokes Trivy in a container and writes JSON
        run: |
          chmod +x tools/scan-image.sh
          IMAGE_REF="${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}@${{ steps.build_image.outputs.digest }}"
          ./tools/scan-image.sh "$IMAGE_REF" trivy-report.json
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  promote_to_stage:
    name: Promote to stage (immutable via digest)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build_and_push_dev
    environment: stage
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Pull by digest and push stage & sha tags
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ needs.build.outputs.image_name }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Promoting digest: ${DIGEST}"
          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:stage"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"
          docker push "${REG}/${IMG}:stage"
          docker push "${REG}/${IMG}:${SHA_TAG}"

  promote_to_prod:
    name: Promote to prod (immutable via digest)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: promote_to_stage
    environment: prod
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Pull by digest and push prod & sha tags
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ needs.build.outputs.image_name }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Promoting digest: ${DIGEST}"
          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:prod"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"
          docker push "${REG}/${IMG}:prod"
          docker push "${REG}/${IMG}:${SHA_TAG}"
