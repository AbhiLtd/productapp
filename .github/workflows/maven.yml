# CI/CD for a Java (Maven) app:
# - builds the Maven project
# - uploads the built JAR as an artifact
# - builds and pushes Docker image to REGISTRY (dev tag + sha)
# - promotes image to stage and prod (use GitHub Environments to protect stage/prod)
#
# Configure repository secrets:
# - REGISTRY_USERNAME
# - REGISTRY_PASSWORD
#
# Optional: set repository variables or replace env.REGISTRY and env.IMAGE_NAME below.

name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: docker.io                  # change to ghcr.io, <aws_account>.dkr.ecr.<region>.amazonaws.com, etc.
  IMAGE_NAME: youruser/productapp      # set to <namespace>/<repo> (for Docker Hub) or ghcr.io/<owner>/<repo>
  PLATFORMS: linux/amd64

jobs:
  build:
    name: Build (Maven) and upload artifact
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.set_tag.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Set image sha tag
        id: set_tag
        run: |
          # short sha tag (7 chars) - adjust if you prefer full SHA
          echo "sha_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build_and_push_dev:
    name: Build & push Docker image (dev)
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact (JAR)
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push image (dev + sha)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_tag }}
          build-args: |
            JAR_FILE=artifact/*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote_to_stage:
    name: Promote to stage
    runs-on: ubuntu-latest
    needs: build_and_push_dev
    environment: stage
    steps:
      - name: Set up Docker (login)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Pull dev image, tag and push stage & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          SHA="${{ needs.build.outputs.sha_tag }}"
          docker pull "${REG}/${IMG}:dev"
          docker tag "${REG}/${IMG}:dev" "${REG}/${IMG}:stage"
          docker tag "${REG}/${IMG}:dev" "${REG}/${IMG}:${SHA}"
          docker push "${REG}/${IMG}:stage"
          docker push "${REG}/${IMG}:${SHA}"

  promote_to_prod:
    name: Promote to prod
    runs-on: ubuntu-latest
    needs: promote_to_stage
    environment: prod
    steps:
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Pull stage image, tag and push prod & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          SHA="${{ needs.build.outputs.sha_tag }}"
          docker pull "${REG}/${IMG}:stage"
          docker tag "${REG}/${IMG}:stage" "${REG}/${IMG}:prod"
          docker tag "${REG}/${IMG}:stage" "${REG}/${IMG}:${SHA}"
          docker push "${REG}/${IMG}:prod"
          docker push "${REG}/${IMG}:${SHA}"
