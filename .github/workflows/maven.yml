# Java CI/CD with Maven -> build JAR, upload artifact, compute lowercase image name,
# build & push image to GHCR (dev tag + sha), and promote image immutably dev -> stage -> prod.
#
# Behavior:
# - build job computes lowercase image name from GITHUB_REPOSITORY and exposes it as output
# - push/promote jobs are skipped for pull_request events (avoids secrets being required on forks)
# - login prefers GHCR_PAT/GHCR_USERNAME (if set) and falls back to secrets.GITHUB_TOKEN
#
# Secrets (optional for PAT usage):
# - GHCR_USERNAME (string)
# - GHCR_PAT (personal access token with packages:write)
#
# Ensure you create GitHub Environments "stage" and "prod" to enable approvals if desired.

name: Java CI/CD with Maven and GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build (Maven) and upload artifact
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_image.outputs.image_name }}
      sha_tag: ${{ steps.set_tag.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Set image sha tag
        id: set_tag
        run: |
          # short sha tag (7 chars)
          echo "sha_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set lowercase image name (owner/repo -> lowercased)
        id: set_image
        run: |
          # Convert GITHUB_REPOSITORY (Owner/Repo) to lowercase owner/repo for docker tags
          repo_lower=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${repo_lower}" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build_and_push_dev:
    name: Build & push Docker image (dev)
    if: ${{ github.event_name != 'pull_request' }}    # skip push for PRs from forks (no secrets)
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    outputs:
      image_digest: ${{ steps.build_image.outputs.digest }}
      image_name: ${{ needs.build.outputs.image_name }}
    env:
      REGISTRY: ${{ env.REGISTRY }}
      IMAGE_NAME: ${{ needs.build.outputs.image_name }}
      PLATFORMS: ${{ env.PLATFORMS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact (JAR)
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (prefer PAT, fallback to GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Show image reference
        run: |
          echo "Pushing image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          echo "Also tagging with: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_tag }}"

      - name: Build & push image (dev + sha) and capture digest
        id: build_image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_tag }}
          build-args: |
            JAR_FILE=artifact/*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote_to_stage:
    name: Promote to stage (immutable via digest)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build_and_push_dev
    environment: stage
    env:
      REGISTRY: ${{ env.REGISTRY }}
      IMAGE_NAME: ${{ needs.build_and_push_dev.outputs.image_name }}
    steps:
      - name: Login to GHCR (prefer PAT, fallback to GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Pull by digest, tag and push stage & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Using digest: $DIGEST"

          # Pull exact image by digest, tag for stage and push tags
          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:stage"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"

          docker push "${REG}/${IMG}:stage"
          docker push "${REG}/${IMG}:${SHA_TAG}"

  promote_to_prod:
    name: Promote to prod (immutable via digest)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: promote_to_stage
    environment: prod
    env:
      REGISTRY: ${{ env.REGISTRY }}
      IMAGE_NAME: ${{ needs.build_and_push_dev.outputs.image_name }}
    steps:
      - name: Login to GHCR (prefer PAT, fallback to GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Pull by digest, tag and push prod & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Using digest: $DIGEST"

          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:prod"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"

          docker push "${REG}/${IMG}:prod"
          docker push "${REG}/${IMG}:${SHA_TAG}"
