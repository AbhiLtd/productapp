# CI/CD: Maven build -> upload JAR -> multi-arch build & push to GHCR -> immutable promote dev->stage->prod
# This version uses the "dependency chain" approach: promote_to_stage exports outputs,
# promote_to_prod depends only on promote_to_stage and reads its outputs.
#
# Notes:
# - Provide GHCR_USERNAME & GHCR_PAT (recommended) in repository secrets; if not present, the workflow falls back to GITHUB_TOKEN.
# - Push/promote jobs are skipped for pull_request events (forked PRs mask secrets).
# - The workflow assumes a single runnable JAR is produced at target/*.jar.
name: Java CI/CD with Maven and GHCR

on:
  push:
    branches: [ "development", "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64
  HEALTH_PORT: 8080
  HEALTH_PATH: /product/health

jobs:

# -----------------------
# BUILD APPLICATION
# -----------------------

  build:
    name: Build Maven Project
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.image }}
      sha_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven Build
        run: mvn -B clean package -DskipTests

      - name: Generate SHA tag
        id: tag
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Normalize image name
        id: image
        run: |
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=${repo}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


# -----------------------
# BUILD & PUSH DOCKER IMAGE
# -----------------------

  build_and_push_image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_digest: ${{ steps.meta.outputs.digest }}
      image_name: ${{ needs.build.outputs.image_name }}
      sha_tag: ${{ needs.build.outputs.sha_tag }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: artifact

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Set tags based on branch
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}"
          SHA="${{ needs.build.outputs.sha_tag }}"

          if [[ "${GITHUB_REF}" == "refs/heads/development" ]]; then
            echo "tags=${IMAGE}:dev,${IMAGE}:${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE}:main,${IMAGE}:${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            JAR_FILE=artifact/*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export metadata
        id: meta
        run: |
          echo "digest=${{ steps.docker_build.outputs.digest }}" >> $GITHUB_OUTPUT


# -----------------------
# PROMOTE TO STAGE
# -----------------------

  promote_to_stage:
    name: Promote Image to Stage
    if: github.ref == 'refs/heads/main'
    needs: build_and_push_image
    runs-on: ubuntu-latest
    environment: stage

    outputs:
      image_name: ${{ needs.build_and_push_image.outputs.image_name }}
      image_digest: ${{ needs.build_and_push_image.outputs.image_digest }}
      sha_tag: ${{ needs.build_and_push_image.outputs.sha_tag }}

    steps:

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote by digest
        run: |
          REG=${{ env.REGISTRY }}
          IMG=${{ needs.build_and_push_image.outputs.image_name }}
          DIGEST=${{ needs.build_and_push_image.outputs.image_digest }}

          docker pull $REG/$IMG@$DIGEST
          docker tag  $REG/$IMG@$DIGEST $REG/$IMG:stage
          docker push $REG/$IMG:stage


# -----------------------
# STAGE SMOKE TESTS
# -----------------------

  stage_checks:
    name: Stage Smoke Tests
    needs: promote_to_stage
    runs-on: ubuntu-latest

    steps:

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.promote_to_stage.outputs.image_name }}@${{ needs.promote_to_stage.outputs.image_digest }}"
          docker run -d --rm --name smoke -p ${{ env.HEALTH_PORT }}:${{ env.HEALTH_PORT }} $IMAGE

      - name: Wait for readiness
        run: |
          URL="http://localhost:${{ env.HEALTH_PORT }}${{ env.HEALTH_PATH }}"
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" $URL || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 2
          done
          docker logs smoke
          exit 1

      - run: docker stop smoke || true


# -----------------------
# PROMOTE TO PROD
# -----------------------

  promote_to_prod:
    name: Promote Image to Prod
    if: github.ref == 'refs/heads/main'
    needs: [stage_checks, promote_to_stage]
    runs-on: ubuntu-latest
    environment: prod

    steps:

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image
        run: |
          REG=${{ env.REGISTRY }}
          IMG=${{ needs.promote_to_stage.outputs.image_name }}
          DIGEST=${{ needs.promote_to_stage.outputs.image_digest }}

          docker pull $REG/$IMG@$DIGEST
          docker tag  $REG/$IMG@$DIGEST $REG/$IMG:prod
          docker push $REG/$IMG:prod
