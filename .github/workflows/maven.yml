# Java CI/CD with Maven -> build JAR, upload artifact, build & push image to GHCR,
# and promote image immutably dev -> stage -> prod using image digest.
#
# Recommended auth:
# - Preferred (production / cross-repo): create a PAT with package write and store as
#   GHCR_USERNAME and GHCR_PAT repository secrets.
# - Simple (same-account repos): the workflow will fall back to using GITHUB_TOKEN.
#
# Important: avoid exposing secrets on forked PRs. The login steps are skipped for pull_request events.

name: Java CI/CD with Maven and GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: AbhiLtd/productapp
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build (Maven) and upload artifact
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.set_tag.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Set image sha tag
        id: set_tag
        run: |
          echo "sha_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build_and_push_dev:
    name: Build & push Docker image (dev)
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    outputs:
      image_digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact (JAR)
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login using PAT if provided
      - name: Login to GHCR (PAT)
        if: ${{ secrets.GHCR_PAT != '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # Fallback to GITHUB_TOKEN (works for same-account publishing)
      - name: Login to GHCR (GITHUB_TOKEN fallback)
        if: ${{ secrets.GHCR_PAT == '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (dev + sha) and capture digest
        id: build_image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_tag }}
          build-args: |
            JAR_FILE=artifact/*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote_to_stage:
    name: Promote to stage (immutable via digest)
    runs-on: ubuntu-latest
    needs: build_and_push_dev
    environment: stage
    steps:
      - name: Login to GHCR (PAT)
        if: ${{ secrets.GHCR_PAT != '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to GHCR (GITHUB_TOKEN fallback)
        if: ${{ secrets.GHCR_PAT == '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest, tag and push stage & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Using digest: $DIGEST"

          # Pull exact image by digest, tag for stage and push tags
          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:stage"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"

          docker push "${REG}/${IMG}:stage"
          docker push "${REG}/${IMG}:${SHA_TAG}"

  promote_to_prod:
    name: Promote to prod (immutable via digest)
    runs-on: ubuntu-latest
    needs: promote_to_stage
    environment: prod
    steps:
      - name: Login to GHCR (PAT)
        if: ${{ secrets.GHCR_PAT != '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to GHCR (GITHUB_TOKEN fallback)
        if: ${{ secrets.GHCR_PAT == '' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest, tag and push prod & sha
        run: |
          set -e
          REG="${{ env.REGISTRY }}"
          IMG="${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build_and_push_dev.outputs.image_digest }}"
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"

          echo "Using digest: $DIGEST"

          docker pull "${REG}/${IMG}@${DIGEST}"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:prod"
          docker tag "${REG}/${IMG}@${DIGEST}" "${REG}/${IMG}:${SHA_TAG}"

          docker push "${REG}/${IMG}:prod"
          docker push "${REG}/${IMG}:${SHA_TAG}"
